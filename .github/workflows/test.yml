name: Test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install "pydantic>=2,<3"
      - name: Run unit tests
        run: python -m unittest tests/test_group_debouncer.py -v
